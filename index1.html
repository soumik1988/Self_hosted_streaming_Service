<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DIY Streaming Service</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            background-color: #141414;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 { text-align: center; }
        
        #player-container {
            display: none; 
            max-width: 800px;
            margin: 0 auto 40px auto;
            text-align: center;
        }
        video {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            background-color: black;
        }

        .track-controls { display: flex; justify-content: center; gap: 20px; margin: 15px 0; }
        .track-selector { display: none; flex-direction: column; align-items: flex-start; }
        select, button { padding: 8px; border-radius: 4px; background-color: #333; color: white; border: 1px solid #555; cursor: pointer; }

        /* Navigation Bar */
        #navigation-bar {
            max-width: 1000px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        #current-path-display { font-size: 18px; font-weight: bold; color: #aaa; }

        /* Grid and Cards */
        #movie-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1000px;
            margin: 0 auto;
        }
        .movie-card {
            width: 200px;
            cursor: pointer;
            transition: transform 0.2s;
            position: relative; /* For the folder badge */
        }
        .movie-card:hover { transform: scale(1.05); }
        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .movie-title { text-align: center; margin-top: 10px; font-size: 14px; }
        
        /* Visual indicator for folders */
        .folder-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(229, 9, 20, 0.9); /* Netflix Red */
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>My Streaming Service</h1>

    <div id="player-container">
        <h2 id="now-playing"></h2>
        <video id="video-player" controls></video>
        
        <div class="track-controls">
            <div id="audio-control" class="track-selector">
                <label for="audio-tracks">Audio Language:</label>
                <select id="audio-tracks" onchange="changeAudio()"></select>
            </div>
            <div id="subtitle-control" class="track-selector">
                <label for="subtitle-tracks">Subtitles:</label>
                <select id="subtitle-tracks" onchange="changeSubtitle()"></select>
            </div>
        </div>

        <button onclick="closePlayer()">Close Video</button>
    </div>

    <div id="navigation-bar"></div>
    
    <div id="movie-grid"></div>

    <script>
        let hls; 

        // 1. Fetch directory contents instead of all movies
        async function fetchDirectory(path = "") {
            try {
                const response = await fetch(`/api/browse?path=${encodeURIComponent(path)}`);
                const data = await response.json();
                
                if (data.error) {
                    document.getElementById('movie-grid').innerHTML = `<p>${data.error}</p>`;
                    return;
                }
                
                renderGrid(data.items, data.current_path);
            } catch (error) {
                console.error("Error fetching directory.", error);
            }
        }

        // 2. Render the grid and navigation bar
        function renderGrid(items, currentPath) {
            const grid = document.getElementById("movie-grid");
            const navBar = document.getElementById("navigation-bar");
            grid.innerHTML = "";
            navBar.innerHTML = "";

            // Build the "Back" button if we are inside a folder
            if (currentPath !== "") {
                const backBtn = document.createElement("button");
                backBtn.innerText = "⬅ Back";
                backBtn.onclick = () => {
                    // Split the path by "/" and remove the last folder to go up one level
                    let parts = currentPath.split("/");
                    parts.pop(); 
                    fetchDirectory(parts.join("/"));
                };
                
                const pathText = document.createElement("span");
                pathText.id = "current-path-display";
                pathText.innerText = " / " + currentPath.replace(/\//g, " / ");
                
                navBar.appendChild(backBtn);
                navBar.appendChild(pathText);
            }

            if (!items || items.length === 0) {
                grid.innerHTML = "<p>This folder is empty.</p>";
                return;
            }

            // Build the cards
            items.forEach(item => {
                const card = document.createElement("div");
                card.className = "movie-card";

                // Click behavior depends on the item type
                if (item.type === "folder") {
                    card.onclick = () => fetchDirectory(item.path);
                } else {
                    card.onclick = () => playMovie(item.playlist_url, item.title);
                }

                const img = document.createElement("img");
                img.src = item.poster_url;
                img.alt = item.title;
                img.onerror = function() { this.src = 'https://via.placeholder.com/200x300?text=No+Poster'; };

                const title = document.createElement("div");
                title.className = "movie-title";
                title.innerText = item.title;

                card.appendChild(img);
                card.appendChild(title);
                
                // Add the visual badge if it's a folder
                if (item.type === "folder") {
                    const badge = document.createElement("div");
                    badge.className = "folder-badge";
                    badge.innerText = "FOLDER";
                    card.appendChild(badge);
                }

                grid.appendChild(card);
            });
        }

        // --- Video Player Logic (Remains Unchanged) ---
        function playMovie(playlistUrl, title) {
            const video = document.getElementById("video-player");
            const container = document.getElementById("player-container");
            document.getElementById("now-playing").innerText = `Now Playing: ${title}`;
            
            document.getElementById("audio-control").style.display = "none";
            document.getElementById("subtitle-control").style.display = "none";
            
            container.style.display = "block";
            window.scrollTo(0, 0);

            if (hls) hls.destroy();

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(playlistUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function(event, data) {
                    video.play();
                    setupTracks(data.audioTracks, data.subtitles); 
                });
            } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
                video.src = playlistUrl;
                video.addEventListener("loadedmetadata", function() { video.play(); });
            }
        }

        function setupTracks(audioTracks, subtitleTracks) {
            if (audioTracks && audioTracks.length > 1) {
                const audioSelect = document.getElementById("audio-tracks");
                audioSelect.innerHTML = ""; 
                audioTracks.forEach((track, index) => {
                    const option = document.createElement("option");
                    option.value = index;
                    option.text = track.name || `Track ${index + 1}`; 
                    audioSelect.appendChild(option);
                });
                audioSelect.value = hls.audioTrack; 
                document.getElementById("audio-control").style.display = "flex";
            }

            if (subtitleTracks && subtitleTracks.length > 0) {
                const subSelect = document.getElementById("subtitle-tracks");
                subSelect.innerHTML = ""; 
                const offOption = document.createElement("option");
                offOption.value = -1;
                offOption.text = "Off";
                subSelect.appendChild(offOption);
                subtitleTracks.forEach((track, index) => {
                    const option = document.createElement("option");
                    option.value = index;
                    option.text = track.name || `Subtitle ${index + 1}`;
                    subSelect.appendChild(option);
                });
                subSelect.value = hls.subtitleTrack; 
                document.getElementById("subtitle-control").style.display = "flex";
            }
        }

        function changeAudio() { hls.audioTrack = parseInt(document.getElementById("audio-tracks").value); }
        function changeSubtitle() { hls.subtitleTrack = parseInt(document.getElementById("subtitle-tracks").value); }

        function closePlayer() {
            document.getElementById("player-container").style.display = "none";
            document.getElementById("video-player").pause();
            if (hls) hls.destroy();
        }

        // Start by fetching the root directory
        fetchDirectory("");
    </script>
</body>
</html>
